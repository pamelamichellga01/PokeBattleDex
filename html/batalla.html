                <li class="nav-item"><button class="btn btn-header dragon" id="dragon">Dragon</button></li>

                <li class="nav-item"><button class="btn btn-header fairy" id="fairy">Fairy</button></li>
            </ul>
        </nav>

        <!-- CONTROLES PRINCIPALES -->
        <section class="panel-control">

            <!-- filtros -->
            <div class="filtros">
                <!-- barra superior -->
                <form class="search-form" onsubmit="return false;">
                    <input type="text" id="searchInput" placeholder="Buscar Pokémon...">
                </form>

                <select id="select-tipo" class="select-tipo">
                    <option value="todos">Ver todos</option>
                    <option value="normal">Normal</option>
                    <option value="fire">Fire</option>
                    <option value="water">Water</option>
                    <option value="grass">Grass</option>
                    <option value="electric">Electric</option>
                    <option value="ice">Ice</option>
                    <option value="fighting">Fighting</option>
                    <option value="poison">Poison</option>
                    <option value="ground">Ground</option>
                    <option value="flying">Flying</option>
                    <option value="psychic">Psychic</option>
                    <option value="bug">Bug</option>
                    <option value="rock">Rock</option>
                    <option value="ghost">Ghost</option>
                    <option value="dark">Dark</option>
                    <option value="dragon">Dragon</option>
                    <option value="steel">Steel</option>
                    <option value="fairy">Fairy</option>
                </select>
                <button type="button" class="btn btn-search">Agregar Pokémon</button>
            </div>
            <div id="sugerencias"></div>

            <!-- modos -->
            <div class="modos">
                <button class="btn" id="btn-human">Con alguien</button>
                <button class="btn" id="btn-maquina">Máquina</button>

                <button class="btn btn-combate">Iniciar combate</button>
            </div>
        </section>
